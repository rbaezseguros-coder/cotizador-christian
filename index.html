<!DOCTYPE html>
<html lang="es">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Cotizador Pro — Christian Sanchez PAS</title>
<link href="https://fonts.googleapis.com/css2?family=Syne:wght@400;600;700;800&family=DM+Sans:ital,opsz,wght@0,9..40,300;0,9..40,400;0,9..40,500;1,9..40,300&display=swap" rel="stylesheet">
<style>
:root {
  --bg: #0a0e14;
  --surface: #111720;
  --surface2: #171e2a;
  --border: #1e2a3a;
  --border2: #263347;
  --green: #00d084;
  --green-dim: rgba(0,208,132,0.12);
  --green-glow: rgba(0,208,132,0.25);
  --blue: #3b9eff;
  --blue-dim: rgba(59,158,255,0.1);
  --yellow: #f5c842;
  --yellow-dim: rgba(245,200,66,0.1);
  --red: #ff5c5c;
  --text: #e2eaf5;
  --text-dim: #7a90a8;
  --text-muted: #3d5068;
  --radius: 14px;
}
* { box-sizing: border-box; margin: 0; padding: 0; }
html { scroll-behavior: smooth; }

body {
  background: var(--bg);
  color: var(--text);
  font-family: 'DM Sans', sans-serif;
  min-height: 100vh;
  overflow-x: hidden;
}

/* Background pattern */
body::before {
  content: '';
  position: fixed;
  inset: 0;
  background:
    radial-gradient(ellipse 80% 50% at 10% 0%, rgba(0,208,132,0.06) 0%, transparent 60%),
    radial-gradient(ellipse 60% 40% at 90% 100%, rgba(59,158,255,0.05) 0%, transparent 60%);
  pointer-events: none;
  z-index: 0;
}

.wrap {
  max-width: 820px;
  margin: 0 auto;
  padding: 36px 20px 100px;
  position: relative;
  z-index: 1;
}

/* ── HEADER ── */
header {
  display: flex;
  align-items: center;
  gap: 14px;
  margin-bottom: 40px;
}

.logo {
  width: 46px; height: 46px;
  background: linear-gradient(135deg, #00d084, #00a86b);
  border-radius: 12px;
  display: flex; align-items: center; justify-content: center;
  font-size: 22px;
  box-shadow: 0 0 24px rgba(0,208,132,0.3);
  flex-shrink: 0;
}

.logo-text h1 {
  font-family: 'Syne', sans-serif;
  font-size: 18px; font-weight: 800;
  letter-spacing: -0.5px;
}

.logo-text p { font-size: 12px; color: var(--text-dim); margin-top: 1px; }

.badge {
  margin-left: auto;
  background: var(--green-dim);
  border: 1px solid rgba(0,208,132,0.3);
  color: var(--green);
  font-size: 10px; font-weight: 600;
  padding: 4px 10px; border-radius: 20px;
  letter-spacing: 1px; text-transform: uppercase;
}

/* ── STEPS ── */
.steps {
  display: flex;
  gap: 0;
  margin-bottom: 36px;
  background: var(--surface);
  border: 1px solid var(--border);
  border-radius: var(--radius);
  padding: 4px;
}

.step {
  flex: 1;
  display: flex;
  align-items: center;
  justify-content: center;
  gap: 8px;
  padding: 10px 8px;
  border-radius: 10px;
  font-size: 12px;
  font-weight: 500;
  color: var(--text-muted);
  transition: all 0.3s;
}

.step.active {
  background: var(--surface2);
  color: var(--text);
  border: 1px solid var(--border2);
}

.step.done { color: var(--green); }

.step-num {
  width: 20px; height: 20px;
  border-radius: 50%;
  background: var(--border);
  display: flex; align-items: center; justify-content: center;
  font-size: 10px; font-weight: 700;
  flex-shrink: 0;
}

.step.active .step-num { background: var(--green); color: #000; }
.step.done .step-num { background: var(--green); color: #000; }

/* ── PANEL ── */
.panel {
  background: var(--surface);
  border: 1px solid var(--border);
  border-radius: var(--radius);
  padding: 28px;
  margin-bottom: 20px;
  display: none;
  animation: slideIn 0.3s ease;
}

.panel.active { display: block; }

@keyframes slideIn {
  from { opacity: 0; transform: translateY(8px); }
  to { opacity: 1; transform: translateY(0); }
}

.panel-title {
  font-family: 'Syne', sans-serif;
  font-size: 16px; font-weight: 700;
  margin-bottom: 6px;
}

.panel-sub { font-size: 13px; color: var(--text-dim); margin-bottom: 24px; }

/* ── DROP ZONE ── */
.dropzone {
  border: 2px dashed var(--border2);
  border-radius: var(--radius);
  padding: 52px 24px;
  text-align: center;
  cursor: pointer;
  transition: all 0.25s;
  position: relative;
  overflow: hidden;
}

.dropzone::before {
  content: '';
  position: absolute; inset: 0;
  background: radial-gradient(ellipse at 50% 0%, var(--green-dim), transparent 70%);
  opacity: 0; transition: opacity 0.3s;
}

.dropzone:hover, .dropzone.over {
  border-color: var(--green);
  background: rgba(0,208,132,0.03);
}
.dropzone:hover::before, .dropzone.over::before { opacity: 1; }

.dz-icon { font-size: 44px; margin-bottom: 14px; line-height: 1; }
.dz-title { font-family: 'Syne', sans-serif; font-size: 17px; font-weight: 700; margin-bottom: 6px; }
.dz-sub { font-size: 13px; color: var(--text-dim); }

.dz-btn {
  display: inline-flex; align-items: center; gap: 8px;
  margin-top: 20px;
  background: var(--surface2);
  border: 1px solid var(--border2);
  color: var(--text);
  padding: 10px 22px; border-radius: 8px;
  font-size: 13px; font-weight: 500;
  cursor: pointer; transition: all 0.2s;
  font-family: 'DM Sans', sans-serif;
}
.dz-btn:hover { border-color: var(--green); color: var(--green); }

input[type="file"] { display: none; }

/* ── FILE CHIP ── */
.file-chip {
  display: none;
  align-items: center; gap: 12px;
  background: var(--surface2);
  border: 1px solid var(--border2);
  border-radius: 10px;
  padding: 12px 16px;
  margin-bottom: 20px;
}
.file-chip.show { display: flex; }
.chip-icon {
  width: 34px; height: 34px;
  background: rgba(255,92,92,0.15);
  border-radius: 8px;
  display: flex; align-items: center; justify-content: center;
  font-size: 16px; flex-shrink: 0;
}
.chip-info { flex: 1; min-width: 0; }
.chip-name { font-size: 13px; font-weight: 500; white-space: nowrap; overflow: hidden; text-overflow: ellipsis; }
.chip-size { font-size: 11px; color: var(--text-dim); }
.chip-remove { background: none; border: none; cursor: pointer; color: var(--text-muted); font-size: 16px; padding: 4px; transition: color 0.2s; line-height: 1; }
.chip-remove:hover { color: var(--red); }

/* ── STATUS ── */
.status {
  display: none;
  align-items: center; gap: 10px;
  padding: 12px 16px; border-radius: 8px;
  font-size: 13px; margin-bottom: 20px;
  animation: slideIn 0.2s ease;
}
.status.show { display: flex; }
.status.info { background: var(--blue-dim); border: 1px solid rgba(59,158,255,0.25); color: var(--blue); }
.status.error { background: rgba(255,92,92,0.1); border: 1px solid rgba(255,92,92,0.25); color: var(--red); }
.status.ok { background: var(--green-dim); border: 1px solid rgba(0,208,132,0.3); color: var(--green); }

/* ── BTN PRIMARY ── */
.btn-primary {
  width: 100%;
  background: var(--green);
  color: #000;
  border: none; border-radius: var(--radius);
  padding: 16px;
  font-family: 'Syne', sans-serif;
  font-size: 15px; font-weight: 800;
  cursor: pointer;
  display: flex; align-items: center; justify-content: center; gap: 10px;
  transition: all 0.2s;
  letter-spacing: -0.3px;
}
.btn-primary:hover:not(:disabled) {
  background: #00e891;
  box-shadow: 0 0 32px rgba(0,208,132,0.35);
  transform: translateY(-1px);
}
.btn-primary:disabled { opacity: 0.4; cursor: not-allowed; transform: none; }

@keyframes spin { to { transform: rotate(360deg); } }
.spinner {
  width: 17px; height: 17px;
  border: 2.5px solid rgba(0,0,0,0.25);
  border-top-color: #000;
  border-radius: 50%;
  animation: spin 0.7s linear infinite;
}

/* ── VEHÍCULO INFO ── */
.vehiculo-card {
  background: var(--surface2);
  border: 1px solid var(--border2);
  border-radius: 10px;
  padding: 16px 20px;
  margin-bottom: 24px;
  display: flex; align-items: center; gap: 16px;
}
.vehiculo-icon { font-size: 28px; }
.vehiculo-info h3 { font-family: 'Syne', sans-serif; font-size: 15px; font-weight: 700; }
.vehiculo-info p { font-size: 12px; color: var(--text-dim); margin-top: 3px; }

/* ── PRECIO TIPO SELECTOR ── */
.precio-selector {
  display: flex; gap: 8px; margin-bottom: 24px;
}
.precio-opt {
  flex: 1;
  background: var(--surface2);
  border: 1px solid var(--border);
  border-radius: 8px;
  padding: 10px 8px;
  text-align: center;
  cursor: pointer;
  transition: all 0.2s;
  font-size: 12px; font-weight: 500;
  color: var(--text-dim);
}
.precio-opt.sel {
  border-color: var(--green);
  color: var(--green);
  background: var(--green-dim);
}
.precio-opt span { display: block; font-size: 10px; color: inherit; opacity: 0.7; margin-top: 2px; }

/* ── COBERTURAS GRID ── */
.coberturas-label {
  font-size: 11px; font-weight: 600;
  color: var(--text-muted);
  text-transform: uppercase; letter-spacing: 1px;
  margin-bottom: 12px;
}

.coberturas-grid {
  display: flex; flex-direction: column; gap: 8px;
  margin-bottom: 28px;
}

.cobertura-card {
  background: var(--surface2);
  border: 1px solid var(--border);
  border-radius: 10px;
  padding: 14px 16px;
  cursor: pointer;
  transition: all 0.2s;
  display: flex; align-items: flex-start; gap: 14px;
  user-select: none;
}

.cobertura-card:hover { border-color: var(--border2); }

.cobertura-card.selected {
  border-color: var(--green);
  background: rgba(0,208,132,0.05);
}

.cobertura-card.selected .cc-check { background: var(--green); border-color: var(--green); }
.cobertura-card.selected .cc-check::after { opacity: 1; }

.cc-check {
  width: 20px; height: 20px; flex-shrink: 0;
  border: 2px solid var(--border2);
  border-radius: 6px;
  margin-top: 1px;
  transition: all 0.2s;
  position: relative;
}
.cc-check::after {
  content: '✓';
  position: absolute; inset: 0;
  display: flex; align-items: center; justify-content: center;
  font-size: 11px; font-weight: 700; color: #000;
  opacity: 0; transition: opacity 0.2s;
}

.cc-body { flex: 1; min-width: 0; }
.cc-top { display: flex; align-items: center; gap: 8px; margin-bottom: 4px; flex-wrap: wrap; }

.cc-code {
  font-size: 10px; font-weight: 700;
  background: var(--border2);
  color: var(--text-dim);
  padding: 2px 7px; border-radius: 4px;
  letter-spacing: 0.5px;
}

.cobertura-card.selected .cc-code { background: rgba(0,208,132,0.2); color: var(--green); }

.cc-name { font-size: 13px; font-weight: 500; line-height: 1.3; }
.cc-adicionales { font-size: 11px; color: var(--text-muted); margin-top: 4px; }

.cc-precio {
  text-align: right; flex-shrink: 0;
}
.cc-precio-val {
  font-family: 'Syne', sans-serif;
  font-size: 15px; font-weight: 700;
  color: var(--text);
}
.cc-precio-label { font-size: 10px; color: var(--text-muted); margin-top: 2px; }

.cobertura-card.selected .cc-precio-val { color: var(--green); }

/* ── DESCUENTO CHIP ── */
.descuento-chip {
  background: var(--yellow-dim);
  border: 1px solid rgba(245,200,66,0.25);
  border-radius: 8px;
  padding: 10px 14px;
  font-size: 12px;
  color: var(--yellow);
  margin-bottom: 24px;
  display: flex; align-items: center; gap: 8px;
}

/* ── RESULTADO ── */
.resultado-header {
  display: flex; align-items: center; justify-content: space-between;
  margin-bottom: 12px;
}
.resultado-title {
  font-family: 'Syne', sans-serif;
  font-size: 13px; font-weight: 700;
  color: var(--text-dim);
  text-transform: uppercase; letter-spacing: 1px;
}
.resultado-actions { display: flex; gap: 8px; }

.btn-sm {
  background: var(--surface2);
  border: 1px solid var(--border2);
  color: var(--text);
  padding: 7px 13px; border-radius: 7px;
  font-size: 12px; font-weight: 500;
  cursor: pointer; transition: all 0.2s;
  font-family: 'DM Sans', sans-serif;
  display: flex; align-items: center; gap: 5px;
}
.btn-sm:hover { border-color: var(--green); color: var(--green); }

.resultado-box {
  background: var(--surface2);
  border: 1px solid var(--border2);
  border-radius: var(--radius);
  padding: 20px;
  font-size: 14px; line-height: 1.8;
  white-space: pre-wrap; word-break: break-word;
  min-height: 120px;
  margin-bottom: 16px;
}

.btn-whatsapp {
  display: flex; align-items: center; justify-content: center; gap: 10px;
  width: 100%;
  background: #075e54; color: #fff;
  border: none; border-radius: var(--radius);
  padding: 15px;
  font-family: 'Syne', sans-serif;
  font-size: 15px; font-weight: 700;
  cursor: pointer; transition: all 0.2s;
  text-decoration: none;
  letter-spacing: -0.2px
