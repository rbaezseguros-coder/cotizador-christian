<!DOCTYPE html>
<html lang="es">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Cotizador WhatsApp — Christian</title>
<link href="https://fonts.googleapis.com/css2?family=Syne:wght@700;800&family=DM+Sans:wght@400;500&display=swap" rel="stylesheet">
<style>
  :root {
    --bg: #0f172a; --card: #1e293b; --border: rgba(255,255,255,0.08);
    --blue: #3b82f6; --green: #25D366; --text: #f1f5f9; --muted: #64748b; --subtle: #273344;
  }
  *, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }
  body { background: var(--bg); color: var(--text); font-family: 'DM Sans', sans-serif; min-height: 100vh; }
  .wrap { max-width: 540px; margin: 0 auto; padding: 24px 16px; position: relative; }
  header { display: flex; align-items: center; gap: 12px; margin-bottom: 24px; }
  .logo { width: 42px; height: 42px; border-radius: 12px; background: linear-gradient(135deg,#3b82f6,#6366f1); display: grid; place-items: center; font-size: 20px; }
  .brand-name { font-family: 'Syne', sans-serif; font-weight: 800; font-size: 1.05rem; }
  .card { background: var(--card); border: 1px solid var(--border); border-radius: 18px; margin-bottom: 16px; padding: 20px; }
  #dropzone { border: 2px dashed rgba(59,130,246,0.3); border-radius: 14px; padding: 30px; text-align: center; cursor: pointer; }
  #msgBox { background: var(--subtle); border-radius: 14px; padding: 15px; font-size: 0.85rem; line-height: 1.6; white-space: pre-wrap; margin-top: 15px; display: none; }
  .btn { width: 100%; padding: 14px; border-radius: 12px; border: none; font-weight: 600; cursor: pointer; margin-top: 10px; display: flex; align-items: center; justify-content: center; gap: 8px; }
  .btn-wa { background: var(--green); color: #fff; }
  .loader { display: none; text-align: center; margin-top: 15px; color: var(--blue); font-weight: 500; }
</style>
</head>
<body>
<div class="wrap">
  <header>
    <div class="logo">🚗</div>
    <div><div class="brand-name">Cotizador Pro</div><div style="font-size:0.75rem;color:var(--muted)">Christian Sanchez · PAS</div></div>
  </header>

  <div class="card">
    <div id="dropzone" onclick="document.getElementById('fileInput').click()">
      <p>📄 <strong>Subir PDF de El Norte</strong></p>
      <span style="font-size: 0.8rem; color: var(--muted)">Tocá aquí desde el celu o arrastrá desde la PC</span>
    </div>
    <input type="file" id="fileInput" style="display:none" accept=".pdf" onchange="procesar(this.files[0])">
    <div id="loader" class="loader">⚙️ Procesando franquicias...</div>
  </div>

  <div class="card" id="resultCard" style="display:none">
    <div id="msgBox"></div>
    <button class="btn btn-wa" onclick="enviarWa()">📱 Enviar por WhatsApp</button>
  </div>
</div>

<script>
let textoFinal = "";

async function procesar(file) {
  if (!file) return;
  document.getElementById('loader').style.display = 'block';
  
  const base64 = await new Promise((res) => {
    const r = new FileReader();
    r.onload = () => res(r.result.split(',')[1]);
    r.readAsDataURL(file);
  });

  try {
    // Aquí llamaremos a la función de Netlify que configuraremos después
    const response = await fetch('/.netlify/functions/procesar', {
      method: 'POST',
      body: JSON.stringify({ base64 })
    });
    const data = await response.json();
   textoFinal = data.msg || JSON.stringify(data);
    document.getElementById('msgBox').innerText = textoFinal;
    document.getElementById('msgBox').style.display = 'block';
    document.getElementById('resultCard').style.display = 'block';
  } catch (e) {
    alert("Error al procesar. Revisá la conexión.");
  } finally {
    document.getElementById('loader').style.display = 'none';
  }
}

function enviarWa() {
  const url = `https://wa.me/?text=${encodeURIComponent(textoFinal)}`;
  window.open(url, '_blank');
}
</script>
</body>
</html>
